<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">OmenCore thermal control mark</title>
  <desc id="desc">A premium vector mark for OmenCore showing thermal flow, fan control, and telemetry.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#151928"/>
      <stop offset="0.55" stop-color="#0f1320"/>
      <stop offset="1" stop-color="#090b12"/>
    </linearGradient>
    <linearGradient id="redline" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff4b6a"/>
      <stop offset="0.52" stop-color="#ff174f"/>
      <stop offset="1" stop-color="#a90933"/>
    </linearGradient>
    <linearGradient id="cyanline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#26c6da"/>
      <stop offset="1" stop-color="#64b5f6"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="960" height="540" rx="32" fill="url(#bg)"/>
  <path d="M92 388 C210 320 256 228 354 238 C454 248 456 356 548 352 C642 348 670 252 760 230 C818 216 860 238 892 270"
        fill="none" stroke="url(#cyanline)" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
  <path d="M112 398 C226 328 268 252 352 256 C444 260 468 382 568 370 C670 358 680 286 764 258 C824 238 862 254 898 302"
        fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.18"/>
  <g transform="translate(480 268)" filter="url(#softGlow)">
    <circle r="118" fill="#121827" stroke="#3c4f7a" stroke-width="2"/>
    <circle r="86" fill="#0d111c" stroke="#26324d" stroke-width="2"/>
    <path d="M0 -70 C34 -44 40 -18 24 -2 C10 12 -14 14 -30 0 C-44 -14 -36 -42 0 -70Z" fill="url(#redline)"/>
    <path d="M70 0 C44 34 18 40 2 24 C-12 10 -14 -14 0 -30 C14 -44 42 -36 70 0Z" fill="url(#redline)" opacity="0.86"/>
    <path d="M0 70 C-34 44 -40 18 -24 2 C-10 -12 14 -14 30 0 C44 14 36 42 0 70Z" fill="url(#redline)" opacity="0.72"/>
    <path d="M-70 0 C-44 -34 -18 -40 -2 -24 C12 -10 14 14 0 30 C-14 44 -42 36 -70 0Z" fill="url(#redline)" opacity="0.86"/>
    <circle r="22" fill="#f5f7ff"/>
    <circle r="10" fill="#ff174f"/>
  </g>
  <g transform="translate(96 88)">
    <rect width="226" height="58" rx="14" fill="#151b2d" stroke="#30405f"/>
    <text x="22" y="36" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#f5f7ff">OmenCore</text>
    <text x="138" y="36" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#26c6da">3.8</text>
  </g>
  <g transform="translate(656 372)">
    <rect width="240" height="64" rx="16" fill="#101624" stroke="#33486f"/>
    <circle cx="34" cy="32" r="10" fill="#49c45c"/>
    <text x="56" y="28" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#f5f7ff">THERMAL OWNERSHIP</text>
    <text x="56" y="45" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#9aa3b8">fans, telemetry, profiles</text>
  </g>
</svg>
